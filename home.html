<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级模块 · 主页</title>
    <!-- Font Awesome 5 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 背景渐变让毛玻璃效果可见 */
            background: linear-gradient(145deg, #d9eaff 0%, #ffffff 100%);
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* 垂直列表容器 */
        .vertical-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        /* 卡片模块 —— 横条形状 (长方形) */
        .card {
            position: relative;
            width: 100%;
            height: 84px;                       /* 固定高度，横条 */
            border-radius: 28px;
            cursor: pointer;
            /* 白色到浅蓝渐变，半透明实现毛玻璃基础 */
            background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(200,225,255,0.7));
            backdrop-filter: blur(8px);          /* 毛玻璃效果 */
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
            transition: transform 0.1s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        /* 左下角图标 —— 蓝色，缩小，左上角5%剪裁 */
        .card-icon {
            position: absolute;
            left: 10px;                          /* 略靠边缘 */
            bottom: 8px;
            font-size: 3.8rem;                    /* 适当缩小 */
            color: #2563eb;                       /* 网络连接图标蓝色 */
            line-height: 1;
            pointer-events: none;
            text-shadow: 0 2px 6px rgba(37,99,235,0.2);
            /* 左上角5%剪裁效果 */
            clip-path: polygon(5% 0, 100% 0, 100% 100%, 0 100%, 0 5%);
        }

        /* 卡片文字：居中偏右，蓝色，无阴影 */
        .card-text {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.8rem;
            font-weight: 700;
            color: #2563eb;                        /* 蓝色 */
            text-align: right;
            line-height: 1.2;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }

        /* 小屏幕适配 */
        @media (max-width: 500px) {
            .card {
                height: 70px;                      /* 等比缩小 */
            }
            .card-icon {
                font-size: 3.2rem;
                left: 8px;
                bottom: 6px;
            }
            .card-text {
                font-size: 1.5rem;
                right: 18px;
            }
        }

        /* 模态框遮罩 (无阴影) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #1e1e2f;
            padding: 16px;
            border-radius: 32px;
            max-width: 90vw;
            max-height: 90vh;
            box-shadow: none;
            position: relative;
        }

        .modal-image {
            display: block;
            max-width: 100%;
            max-height: 80vh;
            border-radius: 20px;
            border: 3px solid white;
        }

        .close-modal {
            position: absolute;
            top: 0px;
            right: 4px;
            font-size: 3rem;
            color: white;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 0 12px;
            text-shadow: none;
            transition: none;
            line-height: 1;
        }

        .close-modal:hover {
            color: #ffb3b3;
        }
    </style>
</head>
<body>
    <div class="vertical-list">
        <!-- 模块1：物品查询 -->
        <div class="card" id="module1">
            <i class="fas fa-search card-icon"></i>
            <span class="card-text">物品查询</span>
        </div>

        <!-- 模块2：拍照搜索 -->
        <div class="card" id="module2">
            <i class="fas fa-camera card-icon"></i>
            <span class="card-text">拍照搜索</span>
        </div>

        <!-- 模块3：电路图查看 (点击弹出模态框) -->
        <div class="card" id="module3">
            <i class="fas fa-bolt card-icon"></i>
            <span class="card-text">电路图查看</span>
        </div>

        <!-- 模块4：网络连接 -->
        <div class="card" id="module4">
            <i class="fas fa-wifi card-icon"></i>
            <span class="card-text">网络连接</span>
        </div>

        <!-- 模块5：用户体验改进计划 -->
        <div class="card" id="module5">
            <i class="fas fa-smile card-icon"></i>
            <span class="card-text">用户体验<br>改进计划</span>
        </div>
    </div>

    <!-- 模态框：用于电路图查看 (electricity/01.png) -->
    <div class="modal-overlay" id="imageModal">
        <div class="modal-content">
            <img class="modal-image" id="modalImg" src="" alt="电路图">
            <span class="close-modal" id="closeModalBtn">&times;</span>
        </div>
    </div>

    <script>
        (function() {
            const module1 = document.getElementById('module1');
            const module2 = document.getElementById('module2');
            const module3 = document.getElementById('module3');
            const module4 = document.getElementById('module4');
            const module5 = document.getElementById('module5');

            const modalOverlay = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            const closeBtn = document.getElementById('closeModalBtn');

            module1.addEventListener('click', () => {
                window.location.href = 'search/01.html';
            });

            module2.addEventListener('click', () => {
                window.location.href = 'psearch/01.html';
            });

            module3.addEventListener('click', (e) => {
                e.stopPropagation();
                modalImg.src = 'electricity/01.png';
                modalOverlay.classList.add('active');
            });

            module4.addEventListener('click', () => {
                window.location.href = 'wifi/01.html';
            });

            module5.addEventListener('click', () => {
                window.location.href = 'user/01.html';
            });

            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                modalOverlay.classList.remove('active');
                modalImg.src = '';
            });

            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) {
                    modalOverlay.classList.remove('active');
                    modalImg.src = '';
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                    modalOverlay.classList.remove('active');
                    modalImg.src = '';
                }
            });

            modalImg.onerror = () => {
                console.warn('图片 electricity/01.png 加载失败');
                modalImg.alt = '图片不存在';
            };
        })();
    </script>
</body>
</html>
