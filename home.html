<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级模块 · 主页</title>
    <!-- Font Awesome 5 (CDN) 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f4f8;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* 垂直列表容器 */
        .vertical-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        /* 卡片模块 —— 横条样式，无阴影 */
        .card {
            position: relative;
            width: 100%;
            height: 120px;           /* 固定高度，形成横条 */
            border-radius: 28px;
            cursor: pointer;
            background-color: #ccc;  /* fallback, 由行内背景色覆盖 */
            box-shadow: none;
            border: none;
            flex-shrink: 0;
            transition: none;
        }

        /* 左下角放大图标 —— 无阴影 */
        .card-icon {
            position: absolute;
            left: 20px;
            bottom: 15px;
            font-size: 4.2rem;        /* 适合横条高度 */
            color: rgba(0, 0, 0, 0.3); /* 深色半透明，比背景深 */
            line-height: 1;
            pointer-events: none;
            text-shadow: none;
        }

        /* 卡片文字：居中偏右，深色，无阴影 */
        .card-text {
            position: absolute;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            font-weight: 700;
            color: #111;               /* 深色无阴影 */
            text-align: right;
            line-height: 1.2;
            pointer-events: none;
            text-shadow: none;
        }

        /* 小屏幕适配 */
        @media (max-width: 500px) {
            .card {
                height: 100px;
            }
            .card-icon {
                font-size: 3.5rem;
                left: 15px;
                bottom: 12px;
            }
            .card-text {
                font-size: 1.6rem;
                right: 20px;
            }
        }

        /* 模态框遮罩 (无阴影) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #1e1e2f;
            padding: 16px;
            border-radius: 32px;
            max-width: 90vw;
            max-height: 90vh;
            box-shadow: none;
            position: relative;
        }

        .modal-image {
            display: block;
            max-width: 100%;
            max-height: 80vh;
            border-radius: 20px;
            border: 3px solid white;
        }

        .close-modal {
            position: absolute;
            top: 0px;
            right: 4px;
            font-size: 3rem;
            color: white;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 0 12px;
            text-shadow: none;
            transition: none;
            line-height: 1;
        }

        .close-modal:hover {
            color: #ffb3b3;
        }
    </style>
</head>
<body>
    <div class="vertical-list">
        <!-- 模块1：物品查询 (背景 #456995) -->
        <div class="card" style="background-color: #456995;" id="module1">
            <i class="fas fa-search card-icon"></i>
            <span class="card-text">物品查询</span>
        </div>

        <!-- 模块2：拍照搜索 (背景 #79FF93) -->
        <div class="card" style="background-color: #79FF93;" id="module2">
            <i class="fas fa-camera card-icon"></i>
            <span class="card-text">拍照搜索</span>
        </div>

        <!-- 模块3：电路图查看 (背景 #FFD291) 点击弹出模态框 -->
        <div class="card" style="background-color: #FFD291;" id="module3">
            <i class="fas fa-bolt card-icon"></i>
            <span class="card-text">电路图查看</span>
        </div>

        <!-- 模块4：网络连接 (背景 #FF9691) -->
        <div class="card" style="background-color: #FF9691;" id="module4">
            <i class="fas fa-wifi card-icon"></i>
            <span class="card-text">网络连接</span>
        </div>

        <!-- 模块5：用户体验改进计划 (背景 #FFF891) -->
        <div class="card" style="background-color: #FFF891;" id="module5">
            <i class="fas fa-smile card-icon"></i>
            <span class="card-text">用户体验<br>改进计划</span>
        </div>
    </div>

    <!-- 模态框：用于电路图查看 (electricity/01.png) -->
    <div class="modal-overlay" id="imageModal">
        <div class="modal-content">
            <img class="modal-image" id="modalImg" src="" alt="电路图">
            <span class="close-modal" id="closeModalBtn">&times;</span>
        </div>
    </div>

    <script>
        (function() {
            const module1 = document.getElementById('module1');
            const module2 = document.getElementById('module2');
            const module3 = document.getElementById('module3');
            const module4 = document.getElementById('module4');
            const module5 = document.getElementById('module5');

            const modalOverlay = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            const closeBtn = document.getElementById('closeModalBtn');

            // 模块1 跳转
            module1.addEventListener('click', () => {
                window.location.href = 'search/01.html';
            });

            // 模块2 跳转
            module2.addEventListener('click', () => {
                window.location.href = 'psearch/01.html';
            });

            // 模块3 显示模态框加载图片
            module3.addEventListener('click', (e) => {
                e.stopPropagation();
                modalImg.src = 'electricity/01.png';
                modalOverlay.classList.add('active');
            });

            // 模块4 跳转
            module4.addEventListener('click', () => {
                window.location.href = 'wifi/01.html';
            });

            // 模块5 跳转
            module5.addEventListener('click', () => {
                window.location.href = 'user/01.html';
            });

            // 关闭模态框
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                modalOverlay.classList.remove('active');
                modalImg.src = '';
            });

            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) {
                    modalOverlay.classList.remove('active');
                    modalImg.src = '';
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                    modalOverlay.classList.remove('active');
                    modalImg.src = '';
                }
            });

            modalImg.onerror = () => {
                console.warn('图片 electricity/01.png 加载失败');
                modalImg.alt = '图片不存在';
            };
        })();
    </script>
</body>
</html>
