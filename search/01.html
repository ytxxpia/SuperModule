<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品查询 · 超级模块</title>
    <!-- Font Awesome 5 图标库 (仅用于必要图标) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f4f8;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .search-panel {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }

        .search-header {
            font-size: 1.8rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-header i {
            color: #456995;
            font-size: 2rem;
        }

        .search-area {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            background: #ffffff;
        }

        .search-area input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 0;
            font-size: 1.1rem;
            outline: none;
        }

        .search-area input::placeholder {
            color: #94a3b8;
        }

        .search-area button {
            background: #2563eb;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.1s;
        }

        .search-area button:hover {
            background: #1d4ed8;
        }

        .result-area {
            min-height: 100px;
            padding: 16px 0 8px;
        }

        .status-line {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            margin-bottom: 12px;
        }

        .status-line i {
            font-size: 2rem;
        }

        .success { color: #2e7d32; }
        .fail { color: #c62828; }
        .warn { color: #b85e00; }

        .detail {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }

        .item-name {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .item-desc {
            font-size: 1.1rem;
            color: #334155;
        }

        .error-message {
            color: #b91c1c;
            background: #fee2e2;
            padding: 16px 20px;
            border-radius: 24px;
            border: 1px solid #fecaca;
        }

        .warn-message {
            color: #854d0e;
            background: #fef9c3;
            padding: 16px 20px;
            border-radius: 24px;
            border: 1px solid #fde047;
        }

        .footer-hint {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="search-panel">
        <div class="search-header">
            <i class="fas fa-search"></i> 物品查询
        </div>

        <div class="search-area">
            <input type="text" id="searchInput" placeholder="输入编号或名称...">
            <button id="searchBtn"><i class="fas fa-arrow-right"></i> 查询</button>
        </div>

        <div class="result-area" id="resultArea">
            <!-- 动态内容由JS填充，初始为空或提示 -->
        </div>

        <div class="footer-hint">
            <i class="far fa-file-alt"></i> 数据源: name.csv
        </div>
    </div>

    <script>
        (function() {
            // ---------- 状态 ----------
            let csvRecords = [];          // 解析后的数据 [{编号,名称,简介}]
            let configError = false;       // name.csv 是否加载失败
            let loadAttempted = false;

            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultArea = document.getElementById('resultArea');

            // ---------- 写入 user 数据库的 log (存储no-name.csv错误) ----------
            function writeLogToUserDB(extraInfo) {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open('user', 1);
                    request.onupgradeneeded = (ev) => {
                        const db = ev.target.result;
                        if (!db.objectStoreNames.contains('log')) {
                            db.createObjectStore('log', { autoIncrement: true });
                        }
                    };
                    request.onsuccess = (ev) => {
                        const db = ev.target.result;
                        const tx = db.transaction('log', 'readwrite');
                        const store = tx.objectStore('log');
                        const record = {
                            timestamp: new Date().toISOString(),
                            event: 'no-name.csv missing',
                            userAgent: navigator.userAgent,
                            extra: extraInfo || ''
                        };
                        store.add(record);
                        tx.oncomplete = () => db.close();
                        resolve();
                    };
                    request.onerror = (err) => reject(err);
                });
            }

            // ---------- 加载 name.csv ----------
            async function loadCSV() {
                try {
                    const resp = await fetch('name.csv');
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const text = await resp.text();
                    parseCSV(text);
                    configError = false;
                } catch (err) {
                    console.error('CSV加载失败', err);
                    configError = true;
                    // 异步写日志，不等待
                    writeLogToUserDB(err.message).catch(e => console.warn('日志写入失败', e));
                    renderConfigError();
                } finally {
                    loadAttempted = true;
                    // 如果有初始查询？可以在加载后自动重绘一次，但不需要
                }
            }

            // 解析CSV：第一行标题，后面数据 (编号,名称,简介)
            function parseCSV(csvText) {
                const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
                if (lines.length === 0) {
                    csvRecords = [];
                    return;
                }

                // 忽略标题行，从索引1开始取数据
                for (let i = 1; i < lines.length; i++) {
                    const parts = lines[i].split(',').map(s => s.trim());
                    if (parts.length >= 3) {
                        csvRecords.push({
                            编号: parts[0],
                            名称: parts[1],
                            简介: parts[2]
                        });
                    } else if (parts.length === 2) {
                        csvRecords.push({
                            编号: parts[0],
                            名称: parts[1],
                            简介: ''
                        });
                    }
                    // 忽略过短行
                }
                console.log(`已加载 ${csvRecords.length} 条记录`);
            }

            // 渲染配置错误 (黄色叉)
            function renderConfigError() {
                resultArea.innerHTML = `
                    <div class="status-line warn">
                        <i class="fas fa-times-circle"></i> <span>配置文件出错</span>
                    </div>
                    <div class="warn-message">
                        <i class="fas fa-exclamation-triangle"></i> name.csv 未能加载，请检查文件是否存在。
                    </div>
                `;
            }

            // 渲染搜索成功
            function renderSuccess(item) {
                resultArea.innerHTML = `
                    <div class="status-line success">
                        <i class="fas fa-check-circle"></i> <span>搜索成功</span>
                    </div>
                    <div class="detail">
                        <div class="item-name">${escapeHTML(item.名称)}</div>
                        <div class="item-desc">${escapeHTML(item.简介) || '暂无简介'}</div>
                    </div>
                `;
            }

            // 渲染搜索失败
            function renderFail() {
                resultArea.innerHTML = `
                    <div class="status-line fail">
                        <i class="fas fa-exclamation-circle"></i> <span>搜索失败</span>
                    </div>
                    <div class="error-message">
                        <i class="fas fa-times-circle"></i> 请输入正确的编号或名称，这一般位于设备的四周的热敏纸铭牌上。
                    </div>
                `;
            }

            // 简单转义
            function escapeHTML(str) {
                if (!str) return '';
                return String(str).replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            // 执行搜索
            function performSearch() {
                if (configError) {
                    renderConfigError();
                    return;
                }

                if (!loadAttempted) {
                    resultArea.innerHTML = `<div class="status-line"><i class="fas fa-spinner fa-pulse"></i> 加载中...</div>`;
                    return;
                }

                const query = searchInput.value.trim();
                if (query === '') {
                    renderFail();
                    return;
                }

                const lowerQ = query.toLowerCase();
                const found = csvRecords.find(item => 
                    item.编号.toString().toLowerCase() === lowerQ || 
                    item.名称.toString().toLowerCase() === lowerQ
                );

                if (found) {
                    renderSuccess(found);
                } else {
                    renderFail();
                }
            }

            // ---------- 初始化 ----------
            loadCSV();  // 异步加载

            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });

            // 初始提示
            resultArea.innerHTML = `<div class="status-line"><i class="fas fa-info-circle" style="color:#64748b;"></i> 输入编号或名称开始查询</div>`;
        })();
    </script>
</body>
</html>
