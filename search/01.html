<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品查询 · 超级模块</title>
    <!-- Font Awesome 5 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .search-container {
            width: 100%;
            max-width: 580px;
            background: white;
            border-radius: 42px;
            padding: 40px 32px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 28px;
            letter-spacing: 1px;
            font-size: 1.8rem;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            border-radius: 60px;
            background: #f1f4f9;
            padding: 6px 6px 6px 22px;
            align-items: center;
        }

        .search-box i {
            color: #7e8b9d;
            font-size: 1.3rem;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 16px 0;
            font-size: 1.2rem;
            outline: none;
            color: #0f1825;
        }

        .search-box input::placeholder {
            color: #9aa9b9;
            font-weight: 300;
        }

        .search-box button {
            background: #2563eb;
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 14px 32px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
            border: 1px solid #2563eb;
        }

        .search-box button:hover {
            background: #1d4ed8;
        }

        .result-card {
            background: #ffffff;
            border-radius: 36px;
            padding: 28px 24px;
            border: 2px solid #e9edf4;
            min-height: 220px;
            display: flex;
            flex-direction: column;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .result-header i {
            font-size: 2.4rem;
        }

        .success {
            color: #2e7d32;
        }

        .fail {
            color: #c62828;
        }

        .warn {
            color: #ed6c02;
        }

        .detail-box {
            margin-top: 8px;
            padding: 16px 20px;
            background: #f8fafd;
            border-radius: 28px;
            border: 1px solid #dee5ed;
        }

        .item-name {
            font-size: 2.6rem;
            font-weight: 700;
            color: #0b1c33;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .item-desc {
            font-size: 1.2rem;
            color: #3a4b64;
            font-weight: 400;
        }

        .fail-message {
            font-size: 1.3rem;
            color: #b71c1c;
            background: #ffebee;
            padding: 20px;
            border-radius: 28px;
            border: 1px solid #ffcdd2;
        }

        .fail-message i {
            margin-right: 12px;
            font-size: 2rem;
            vertical-align: middle;
        }

        .warn-message {
            font-size: 1.3rem;
            color: #8a5800;
            background: #fff3e0;
            padding: 20px;
            border-radius: 28px;
            border: 1px solid #ffe0b2;
        }

        .warn-message i {
            margin-right: 12px;
            font-size: 2rem;
            vertical-align: middle;
        }

        .hint-text {
            font-size: 1rem;
            color: #546e7a;
            margin-top: 12px;
            padding-left: 10px;
        }

        /* 辅助文案 */
        .footer-note {
            text-align: center;
            margin-top: 18px;
            color: #7e8b9d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <h2><i class="fas fa-search" style="color: #456995; margin-right: 10px;"></i>物品查询</h2>

        <!-- 搜索框区 -->
        <div class="search-box">
            <i class="fas fa-tag"></i>
            <input type="text" id="searchInput" placeholder="输入编号或名称...">
            <button id="searchBtn"><i class="fas fa-arrow-right"></i> 查询</button>
        </div>

        <!-- 结果显示区 -->
        <div class="result-card" id="resultCard">
            <div class="result-header" id="resultHeader">
                <!-- 动态填充图标和状态 -->
            </div>
            <div id="resultDetail" class="detail-box" style="display: none;">
                <!-- 成功时显示名称+简介，失败/错误时显示自定义消息 -->
            </div>
            <div id="fallbackMessage" style="display: none;" class=""></div>
        </div>
        <div class="footer-note">
            <i class="far fa-file-alt"></i> 数据来源: name.csv
        </div>
    </div>

    <script>
        (function() {
            // ---------- 全局变量 ----------
            let csvData = [];                 // 解析后的数据 [{编号,名称,简介}]
            let configError = false;           // name.csv 是否加载失败
            let csvLoadAttempted = false;      // 是否尝试过加载

            // DOM 元素
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultHeader = document.getElementById('resultHeader');
            const resultDetail = document.getElementById('resultDetail');
            const fallbackMsgDiv = document.getElementById('fallbackMessage'); // 备用，实际上我们将使用 resultDetail 显示失败信息

            // ---------- 工具函数：写入 user 数据库的 log 存储 ----------
            function writeLogToUserDB(messageDetail) {
                return new Promise((resolve, reject) => {
                    // 打开 (或创建) 数据库 "user"，版本1
                    const request = indexedDB.open('user', 1);
                    
                    request.onupgradeneeded = (ev) => {
                        const db = ev.target.result;
                        // 如果没有 log 对象存储则创建
                        if (!db.objectStoreNames.contains('log')) {
                            // 使用自动递增主键
                            db.createObjectStore('log', { autoIncrement: true });
                        }
                    };

                    request.onsuccess = (ev) => {
                        const db = ev.target.result;
                        // 确保 log 存储存在（如果数据库刚刚创建，onupgradeneeded 已执行）
                        // 开始事务
                        const tx = db.transaction('log', 'readwrite');
                        const store = tx.objectStore('log');

                        // 构造记录: 时间戳 + 固定标记 + userAgent
                        const record = {
                            timestamp: new Date().toISOString(),
                            event: 'no-name.csv missing',
                            userAgent: navigator.userAgent,
                            extra: messageDetail || ''   // 可附加额外信息
                        };

                        const addReq = store.add(record);
                        addReq.onsuccess = () => {
                            console.log('日志写入 user 数据库成功');
                            resolve();
                        };
                        addReq.onerror = (err) => {
                            console.error('写入日志失败', err);
                            reject(err);
                        };

                        tx.oncomplete = () => db.close();
                        tx.onerror = (err) => reject(err);
                    };

                    request.onerror = (err) => {
                        console.error('无法打开 user 数据库', err);
                        reject(err);
                    };
                });
            }

            // ---------- 加载 name.csv ----------
            async function loadNameCSV() {
                try {
                    const response = await fetch('name.csv');
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const text = await response.text();
                    parseCSV(text);
                    configError = false;
                } catch (error) {
                    console.error('加载 name.csv 失败', error);
                    configError = true;
                    // 写入日志到 user 数据库 (不等待完成，避免阻塞UI)
                    writeLogToUserDB('Fetch failed: ' + error.message).catch(e => console.warn('写日志失败', e));
                    // 显示配置文件出错界面
                    showConfigError();
                } finally {
                    csvLoadAttempted = true;
                }
            }

            // 解析 CSV 文本 (简单解析，按行，按逗号)
            function parseCSV(csvText) {
                const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
                if (lines.length === 0) {
                    csvData = [];
                    return;
                }

                // 第一行作为标题
                const headers = lines[0].split(',').map(h => h.trim());
                // 期望: 编号,名称,简介  但实际可能顺序不同，我们按位置取: 第一列编号，第二列名称，第三列简介
                // 为保险，使用headers映射，但简单起见，我们按索引
                const data = [];
                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(',').map(v => v.trim());
                    if (values.length >= 3) {
                        data.push({
                            编号: values[0],
                            名称: values[1],
                            简介: values[2]
                        });
                    } else if (values.length === 2) {
                        // 容错，如果只有两列，简介置空
                        data.push({
                            编号: values[0],
                            名称: values[1],
                            简介: ''
                        });
                    }
                    // 忽略过短的行
                }
                csvData = data;
                console.log('CSV 解析完成，共', csvData.length, '条记录');
            }

            // 显示配置文件错误 (黄色叉)
            function showConfigError() {
                resultHeader.innerHTML = '<i class="fas fa-times-circle warn"></i> 配置文件出错';
                resultHeader.className = 'result-header warn';
                resultDetail.style.display = 'block';
                resultDetail.innerHTML = `
                    <div class="warn-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        name.csv 未能加载，请检查文件是否存在。
                    </div>
                `;
                // 隐藏可能多余的 fallback
            }

            // 显示搜索成功
            function showSuccess(item) {
                resultHeader.innerHTML = '<i class="fas fa-check-circle success"></i> 搜索成功';
                resultHeader.className = 'result-header success';
                resultDetail.style.display = 'block';
                resultDetail.innerHTML = `
                    <div class="item-name">${escapeHTML(item.名称)}</div>
                    <div class="item-desc">${escapeHTML(item.简介) || '暂无简介'}</div>
                `;
            }

            // 显示搜索失败
            function showFail() {
                resultHeader.innerHTML = '<i class="fas fa-exclamation-circle fail"></i> 搜索失败';
                resultHeader.className = 'result-header fail';
                resultDetail.style.display = 'block';
                resultDetail.innerHTML = `
                    <div class="fail-message">
                        <i class="fas fa-times-circle"></i>
                        请输入正确的编号或名称，这一般位于设备的四周的热敏纸铭牌上。
                    </div>
                `;
            }

            // 简单转义，防止XSS (虽然数据可信，但习惯)
            function escapeHTML(str) {
                if (!str) return '';
                return String(str).replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            // 执行搜索
            function performSearch() {
                // 如果配置加载失败，直接显示错误
                if (configError) {
                    showConfigError();
                    return;
                }

                // 如果csv未加载但也没报错（可能加载中？但加载是异步，但初始化时就加载了，如果还没完成，可以稍等，但一般很快）
                if (!csvLoadAttempted) {
                    resultHeader.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 加载中...';
                    return;
                }

                const query = searchInput.value.trim();
                if (query === '') {
                    // 可提示，但为了友好，显示搜索失败
                    showFail();
                    return;
                }

                // 忽略大小写比较
                const lowerQuery = query.toLowerCase();
                const found = csvData.find(item => 
                    item.编号.toString().toLowerCase() === lowerQuery || 
                    item.名称.toString().toLowerCase() === lowerQuery
                );

                if (found) {
                    showSuccess(found);
                } else {
                    showFail();
                }
            }

            // ---------- 初始化 ----------
            // 加载 CSV
            loadNameCSV().catch(() => {});  // 内部已处理错误

            // 绑定搜索事件
            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });

            // 初始显示等待/空白 (可显示提示)
            resultHeader.innerHTML = '<i class="fas fa-info-circle" style="color:#607d8b;"></i> 准备就绪';
            resultDetail.style.display = 'none';
        })();
    </script>
</body>
</html>
