<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户体验改进计划 · 超级模块</title>
    <!-- Font Awesome 5 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* 与网络连接、物品查询页面完全一致的风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f4f8;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 32px;
            padding: 32px 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .card-header i {
            font-size: 2.2rem;
            color: #2563eb;        /* 蓝色，无背景光环 */
        }

        .card-header h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #0b1e42;
        }

        .description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #334155;
            margin-bottom: 32px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 28px;
            border: 1px solid #e2e8f0;
        }

        .description i {
            color: #2563eb;
            margin-right: 6px;
        }

        /* 复选框行 */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #f8fafc;
            padding: 16px 20px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
        }

        .checkbox-row input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #2563eb;
            margin: 0;
        }

        .checkbox-row input[type="checkbox"]:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .checkbox-row label {
            font-size: 1.2rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            flex: 1;
        }

        .checkbox-row label i {
            color: #2563eb;
            margin-right: 10px;
            font-size: 1.3rem;
        }

        .checkbox-row input[type="checkbox"]:disabled + label {
            cursor: not-allowed;
        }

        .hint {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #64748b;
            background: #f1f5f9;
            padding: 12px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hint i {
            color: #2563eb;
            font-size: 1.2rem;
        }

        .footer-note {
            margin-top: 24px;
            font-size: 0.85rem;
            color: #94a3b8;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <i class="fas fa-smile"></i>
            <h2>用户体验改进计划</h2>
        </div>

        <div class="description">
            <i class="fas fa-info-circle"></i>
            用户体验改进计划会收集您访问错误的记录，存储在数据库中，这有助于优化网页体验。默认无法关闭，但是您可以选择记录可选数据。
        </div>

        <!-- 复选框行 -->
        <div class="checkbox-row" id="checkboxRow">
            <input type="checkbox" id="optionalDataCheck">
            <label for="optionalDataCheck">
                <i class="fas fa-database"></i> 记录可选数据
            </label>
        </div>

        <div class="hint">
            <i class="fas fa-shield-alt"></i>
            <span>所有数据仅存储在您的浏览器中，不会上传至任何服务器。</span>
        </div>

        <div class="footer-note">
            <i class="fas fa-cog"></i> 状态受主开关及调试模式影响
        </div>
    </div>

    <script>
        (function() {
            // ---------- IndexedDB 工具函数 (操作 super 数据库) ----------
            const DB_NAME = 'super';
            const STORE_NAME = 'settings';
            const DB_VERSION = 1;

            function openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                    request.onupgradeneeded = (ev) => {
                        const db = ev.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME, { keyPath: 'key' });
                        }
                    };
                });
            }

            async function getSetting(key) {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const req = store.get(key);
                    req.onsuccess = () => resolve(req.result ? req.result.value : undefined);
                    req.onerror = () => reject(req.error);
                    tx.oncomplete = () => db.close();
                });
            }

            // ---------- 页面元素 ----------
            const checkbox = document.getElementById('optionalDataCheck');
            const label = document.querySelector('label[for="optionalDataCheck"]');

            // 缓存键名
            const STORAGE_KEY = 'userExperienceOptionalData';

            // ---------- 初始化：根据主开关和调试模式决定复选框状态 ----------
            async function init() {
                try {
                    // 1. 获取用户体验改进计划主开关
                    const userExpEnabled = await getSetting('userExperienceImprovementEnabled') || false;

                    if (!userExpEnabled) {
                        // 主开关关闭：复选框禁用且不勾选
                        checkbox.checked = false;
                        checkbox.disabled = true;
                        label.style.opacity = '0.6';
                        // 清除 localStorage 中可能的历史记录
                        localStorage.removeItem(STORAGE_KEY);
                        return;
                    }

                    // 2. 主开关开启，获取调试模式状态
                    const debugMode = await getSetting('debugModeEnabled') || false;

                    if (debugMode) {
                        // 调试模式开启：强制勾选且禁用
                        checkbox.checked = true;
                        checkbox.disabled = true;
                        label.style.opacity = '0.8';
                        // 存储为 true (可选)
                        localStorage.setItem(STORAGE_KEY, 'true');
                    } else {
                        // 调试模式关闭：从 localStorage 读取用户之前的选择，若无则默认 false
                        const saved = localStorage.getItem(STORAGE_KEY);
                        checkbox.checked = saved === 'true'; // 如果 saved 为 'true' 则勾选
                        checkbox.disabled = false;
                        label.style.opacity = '1';

                        // 监听复选框变化，存储到 localStorage
                        checkbox.addEventListener('change', function(e) {
                            if (!checkbox.disabled) {
                                const value = e.target.checked;
                                localStorage.setItem(STORAGE_KEY, value.toString());
                                console.log('可选数据记录状态已保存:', value);
                            }
                        });
                    }
                } catch (err) {
                    console.error('初始化失败', err);
                    // 降级处理：可勾选，默认 false
                    checkbox.checked = false;
                    checkbox.disabled = false;
                }
            }

            // 启动
            init();
        })();
    </script>
</body>
</html>
